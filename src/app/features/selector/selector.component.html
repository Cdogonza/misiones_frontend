<section class="selector-wrapper">

  <!-- Destellos decorativos -->
  <div class="glow glow-top"></div>
  <div class="glow glow-bottom"></div>

  <div class="selector-card">

    <!-- Header -->
    <div class="selector-header">
      <img src="logo.png" alt="Logo" class="logo-img" />
      <h1>Bn. "Jura de la Constitución" Com. Nº2</h1>
      <p class="subtitle">Bienvenido, <strong>{{ username }}</strong></p>
      <p class="hint">Seleccioná el panel al que deseas acceder</p>
    </div>

    <!-- Botones de selección -->
    <div class="panel-grid">

      <button class="panel-btn inspecciones" (click)="goToInspecciones()" *ngIf="canAccessInspecciones">
        <div class="panel-icon">📋</div>
        <div class="panel-info">
          <span class="panel-label">Inspecciones</span>
          <span class="panel-desc">Gestión de unidades, equipos y componentes</span>
        </div>
        <span class="panel-arrow">→</span>
      </button>

      <button class="panel-btn deposito" (click)="goToDeposito()" *ngIf="canAccessDeposito">
        <div class="panel-icon">📦</div>
        <div class="panel-info">
          <span class="panel-label">Deposito</span>
          <span class="panel-desc">Inventario y pedidos de materiales</span>
        </div>
        <span class="panel-arrow">→</span>
      </button>
      
      <button class="panel-btn mantenimiento" (click)="goToMantenimiento()" *ngIf="canSeeMainMantenimiento()">
        <div class="panel-icon">🛠️</div>
        <div class="panel-info">
          <span class="panel-label">Mantenimiento</span>
          <span class="panel-desc">Gestión (Rec. y Entrega)</span>
        </div>
        <span class="panel-arrow">→</span>
      </button>

      <button class="panel-btn mantenimiento sala-i" (click)="goToSalaI()" *ngIf="canSeeSalaI()" 
              style="border-color: rgba(34, 197, 94, 0.4); background: rgba(34, 197, 94, 0.05);">
        <div class="panel-icon" style="color: #22c55e;">🔧</div>
        <div class="panel-info">
          <span class="panel-label" style="color: #22c55e;">SALA I</span>
          <span class="panel-desc">Taller y Reparaciones</span>
        </div>
        <span class="panel-arrow" style="color: #22c55e;">→</span>
      </button>

    </div>

    <!-- Salir -->
    <button class="btn-logout" (click)="logout()">
      <span>⬅</span> Cerrar sesión
    </button>

  </div>
</section>
