<section class="login-wrapper">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <img src="logo.png" alt="Logo Misiones Programa" class="logo-img" />
      <h1>Bn. "Jura de la Constitución" Com. Nº2</h1>
      <p class="subtitle">Iniciá sesión para continuar</p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <!-- Usuario -->
      <div class="field-group" [class.has-error]="usuario.invalid && usuario.touched">
        <label for="usuario">Usuario</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input id="usuario" type="text" formControlName="usuario" placeholder="Tu nombre de usuario"
            autocomplete="username" />
        </div>
        <span class="field-error" *ngIf="usuario.invalid && usuario.touched">
          <ng-container *ngIf="usuario.errors?.['required']">El usuario es obligatorio.</ng-container>
          <ng-container *ngIf="usuario.errors?.['minlength']">Mínimo 3 caracteres.</ng-container>
        </span>
      </div>

      <!-- Contraseña -->
      <div class="field-group" [class.has-error]="password.invalid && password.touched">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
            placeholder="Tu contraseña" autocomplete="current-password" />
          <button type="button" class="toggle-pass" (click)="togglePassword()" tabindex="-1">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="field-error" *ngIf="password.invalid && password.touched">
          <ng-container *ngIf="password.errors?.['required']">La contraseña es obligatoria.</ng-container>
          <ng-container *ngIf="password.errors?.['minlength']">Mínimo 6 caracteres.</ng-container>
        </span>
      </div>

      <!-- Error global -->
      <div class="error-banner" *ngIf="errorMsg">
        <span>⚠️</span> {{ errorMsg }}
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" [disabled]="loading">
        <span class="spinner" *ngIf="loading"></span>
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading">Verificando...</span>
      </button>

    </form>

  </div>
</section>
